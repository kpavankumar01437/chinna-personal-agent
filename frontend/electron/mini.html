<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chinna Mini</title>
    <style>
      :root {
        --paper: #f7f3ea;
        --surface: #fffdf7;
        --ink: #1e2523;
        --muted: #66726d;
        --line: #ded7ca;
        --teal: #146b63;
        --mint: #dceee7;
        --danger: #d75f45;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background:
          radial-gradient(circle at 20% 0%, rgba(20, 107, 99, 0.16), transparent 35%),
          var(--paper);
        color: var(--ink);
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        overflow: hidden;
      }

      body.collapsed {
        background: transparent;
      }

      .card {
        border: 1px solid var(--line);
        display: grid;
        gap: 10px;
        grid-template-rows: auto 108px auto auto;
        height: 100vh;
        overflow: hidden;
        padding: 14px;
        width: 100vw;
      }

      body.collapsed .card {
        display: none;
      }

      .drag {
        -webkit-app-region: drag;
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      h1 {
        align-items: center;
        display: flex;
        font-size: 1rem;
        gap: 8px;
        margin: 0;
        min-width: 0;
      }

      .logo {
        background: var(--teal);
        border-radius: 12px;
        box-shadow: 0 8px 18px rgba(20, 107, 99, 0.24);
        color: var(--paper);
        display: grid;
        flex: 0 0 auto;
        font-weight: 900;
        height: 34px;
        place-items: center;
        width: 34px;
      }

      .title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dot {
        border-radius: 999px;
        display: inline-block;
        height: 10px;
        margin-right: 6px;
        width: 10px;
      }

      .on {
        background: #2d7d46;
      }

      .off {
        background: #c98e1a;
      }

      button {
        -webkit-app-region: no-drag;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 36px;
        padding: 8px 10px;
      }

      .drag button,
      .footer button {
        flex: 0 0 auto;
      }

      button.primary {
        background: var(--teal);
        border-color: var(--teal);
        color: white;
      }

      button.danger {
        background: #ffe8df;
        border-color: #f1b39d;
        color: #8f301e;
      }

      .grid {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      .reply {
        background: rgba(255, 253, 247, 0.8);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 0;
        overflow: hidden;
        padding: 10px;
      }

      small,
      p {
        color: var(--muted);
        margin: 0;
      }

      #mode {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #message {
        max-height: 66px;
        overflow-y: auto;
        padding-right: 4px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #message::-webkit-scrollbar {
        width: 7px;
      }

      #message::-webkit-scrollbar-thumb {
        background: rgba(20, 107, 99, 0.34);
        border-radius: 999px;
      }

      .footer {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .bubble {
        -webkit-app-region: no-drag;
        align-items: center;
        background: linear-gradient(145deg, var(--teal), #0f4f4a);
        border: 1px solid rgba(255, 253, 247, 0.42);
        border-radius: 22px;
        box-shadow: 0 18px 40px rgba(20, 107, 99, 0.3);
        color: var(--paper);
        display: none;
        font-size: 1.45rem;
        font-weight: 900;
        height: 100vh;
        justify-content: center;
        padding: 0;
        position: relative;
        width: 100vw;
      }

      .bubble::after {
        background: #2d7d46;
        border: 2px solid var(--paper);
        border-radius: 999px;
        content: "";
        height: 12px;
        position: absolute;
        right: 9px;
        top: 9px;
        width: 12px;
      }

      body.collapsed .bubble {
        display: flex;
      }
    </style>
  </head>
  <body>
    <button id="bubble" class="bubble" title="Open Chinna Desktop">C</button>

    <section class="card">
      <div class="drag">
        <h1>
          <span class="logo">C</span>
          <span class="title"><span id="dot" class="dot off"></span>Chinna Desktop</span>
        </h1>
        <button id="hide">Hide</button>
      </div>

      <div class="reply">
        <strong id="mode">Checking status...</strong>
        <p id="message">Local desktop companion is starting.</p>
      </div>

      <div class="grid">
        <button id="listener" class="primary">Start Listener</button>
        <button id="wake">Wake</button>
        <button id="sleep">Sleep</button>
        <button id="observe">Observe</button>
        <button id="console">Open Console</button>
        <button id="stop" class="danger">Emergency Stop</button>
      </div>

      <div class="footer">
        <small>Alt+Space opens this mini panel.</small>
        <button id="quit">Quit</button>
      </div>
    </section>

    <script>
      const API = "http://127.0.0.1:8000";
      let listenerOn = false;

      async function request(path, method = "GET") {
        const response = await fetch(`${API}${path}`, { method, headers: { "Content-Type": "application/json" } });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      async function refresh() {
        try {
          const [status, listener] = await Promise.all([
            request("/api/operator/status"),
            request("/api/operator/voice-listener/status"),
          ]);
          listenerOn = listener.enabled;
          document.getElementById("dot").className = `dot ${listener.enabled ? "on" : "off"}`;
          document.getElementById("mode").textContent = `${status.mode} | Wake listener ${listener.enabled ? "on" : "off"}`;
          document.getElementById("message").textContent = listener.last_reply || status.last_message || "Ready on desktop.";
          document.getElementById("listener").textContent = listener.enabled ? "Stop Listener" : "Start Listener";
        } catch (error) {
          document.getElementById("mode").textContent = "Backend unavailable";
          document.getElementById("message").textContent = error.message;
        }
      }

      async function act(path, method = "POST") {
        try {
          const result = await request(path, method);
          if (result.message) document.getElementById("message").textContent = result.message;
          if (result.reply) document.getElementById("message").textContent = result.reply;
          await refresh();
        } catch (error) {
          document.getElementById("message").textContent = error.message;
        }
      }

      document.getElementById("listener").onclick = () =>
        act(listenerOn ? "/api/operator/voice-listener/stop" : "/api/operator/voice-listener/start");
      document.getElementById("wake").onclick = () => act("/api/operator/session/wake");
      document.getElementById("sleep").onclick = () => act("/api/operator/session/sleep");
      document.getElementById("stop").onclick = () => act("/api/operator/session/stop");
      document.getElementById("observe").onclick = () => act("/api/operator/observation", "GET");
      document.getElementById("console").onclick = () => window.omnipilotDesktop?.showMain();
      function setCollapsed(collapsed) {
        document.body.classList.toggle("collapsed", collapsed);
      }

      document.getElementById("hide").onclick = () => {
        setCollapsed(true);
        window.omnipilotDesktop?.collapseMini?.();
      };
      document.getElementById("bubble").onclick = () => {
        setCollapsed(false);
        window.omnipilotDesktop?.expandMini?.();
      };
      document.getElementById("quit").onclick = () => window.omnipilotDesktop?.quit();
      window.omnipilotDesktop?.onRefresh?.(refresh);
      window.omnipilotDesktop?.onMiniCollapsed?.(setCollapsed);

      refresh();
      setInterval(refresh, 2500);
    </script>
  </body>
</html>
